name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for OIDC trusted publishing

jobs:
  # ── Build sdist + wheel ───────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history for dynamic version

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI + GitHub Release ─────────────────────────────────────
  publish:
    name: Publish to PyPI + GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    environment: pypi  # configure trusted publishing in this environment on PyPI
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff needs full history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog for this release (release body)
        run: git cliff --config cliff.toml --current --strip all > body.md

      - name: Commit updated CHANGELOG.md to master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Always work on top of the current master HEAD so re-runs don't
          # produce a non-fast-forward push (body.md is untracked and persists).
          git fetch origin master
          git checkout -B master origin/master
          git cliff --config cliff.toml --output CHANGELOG.md
          git add CHANGELOG.md
          git diff --staged --quiet \
            || git commit -m "chore: update CHANGELOG for ${{ github.ref_name }}"
          git push origin master

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: body.md
          make_latest: true
