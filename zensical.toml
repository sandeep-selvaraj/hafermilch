[project]

site_name = "hafermilch"
site_description = "Multi-persona LLM agents that evaluate your product's UI/UX"
site_author = "hafermilch contributors"
copyright = "Copyright &copy; 2026 hafermilch contributors"

nav = [
  { "Home" = "index.md" },
  { "Get Started" = "get-started.md" },
  { "Concepts" = "concepts.md" },
  { "Browser Backends" = "browser-backends.md" },
  { "Configuration" = [
    { "Personas" = "configuration/personas.md" },
    { "Plans" = "configuration/plans.md" },
    { "LLM Providers" = "configuration/llm-providers.md" },
  ]},
  { "CLI Reference" = "cli-reference.md" },
  { "Development" = "development.md" },
]

extra_css = ["stylesheets/extra.css"]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
logo = "lucide/milk"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.repo]
url = "https://github.com/your-org/hafermilch"
name = "hafermilch"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/your-org/hafermilch"
